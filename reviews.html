<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Reviews | Kanchi Farm Stay</title>
    <meta name="description" content="Read genuine guest reviews of Kanchi Farm Stay from Google, Airbnb and Booking.com. See why guests love our farm retreat near Kanchipuram.">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <div class="reviews-page">
        <section class="reviews-header">
            <div class="container">
                <h1>Guest Reviews</h1>
                <p>See what our guests are saying about their stay at Kanchi Farm Stay</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterReviews('all')">All Reviews</button>
                    <button class="filter-btn" onclick="filterReviews('google')">Google</button>
                    <button class="filter-btn" onclick="filterReviews('airbnb')">Airbnb</button>
                    <button class="filter-btn" onclick="filterReviews('booking')">Booking.com</button>
                </div>

                <!-- Reviews grid -->
                <div id="reviews-grid" class="reviews-grid-page">
                    <!-- Injected by script -->
                </div>
            </div>
        </section>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="script.js?v=4"></script>
</body>

</html>
